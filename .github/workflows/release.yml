name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc8de1b # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2.8.0
        with:
          workspaces: server
      - name: Verify gates before release
        working-directory: server
        shell: bash
        run: |
          cargo fmt --all -- --check
          cargo clippy --all-targets -- -D warnings
          cargo test --all-targets
      - name: Build release
        working-directory: server
        run: cargo build --release --target ${{ matrix.target }}
      - name: Stage artifact (unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          mkdir -p dist
          cp server/target/${{ matrix.target }}/release/figma-write-mcp dist/figma-write-mcp-${{ matrix.target }}
          (cd dist && shasum -a 256 figma-write-mcp-${{ matrix.target }} > figma-write-mcp-${{ matrix.target }}.sha256)
      - name: Stage artifact (windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item server/target/${{ matrix.target }}/release/figma-write-mcp.exe dist/figma-write-mcp-${{ matrix.target }}.exe
          $hash = (Get-FileHash dist/figma-write-mcp-${{ matrix.target }}.exe -Algorithm SHA256).Hash.ToLower()
          "$hash  figma-write-mcp-${{ matrix.target }}.exe" | Out-File -Encoding ascii dist/figma-write-mcp-${{ matrix.target }}.exe.sha256
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: figma-write-mcp-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  plugin:
    name: Bundle plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: 1.3.14
      - name: bun install
        working-directory: plugin
        run: bun install --frozen-lockfile
      - name: typecheck + test + build
        working-directory: plugin
        run: |
          bun run typecheck
          bun test
          bun run build
      - name: Stage plugin
        run: |
          mkdir -p dist
          cp -R plugin/dist plugin/manifest.json plugin/ui.html dist/plugin-bundle/ 2>/dev/null || true
          mkdir -p dist/plugin-bundle/dist
          cp plugin/dist/code.js dist/plugin-bundle/dist/code.js
          cp plugin/manifest.json dist/plugin-bundle/manifest.json
          cp plugin/ui.html dist/plugin-bundle/ui.html
          (cd dist && tar czf plugin-bundle.tar.gz plugin-bundle)
          (cd dist && shasum -a 256 plugin-bundle.tar.gz > plugin-bundle.tar.gz.sha256)
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: plugin-bundle
          path: dist/plugin-bundle.tar.gz*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: [build, plugin]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts
      - name: Flatten
        run: |
          mkdir -p release
          find artifacts -type f \( -name 'figma-write-mcp-*' -o -name 'plugin-bundle*' \) -exec cp {} release/ \;
          (cd release && shasum -a 256 -c *.sha256)
          ls -la release
      - uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2
        with:
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: true
